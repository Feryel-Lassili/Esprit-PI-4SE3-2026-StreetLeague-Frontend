<div class="form-page">
  <div class="form-card">
    <div class="form-card-header">
      <a routerLink="/venue/my-venues" class="back-link" id="back-to-venues-update">← Back to Venues</a>
      <h1 class="form-title">Update Venue</h1>
      <p class="form-subtitle">Modify the venue details below.</p>
    </div>

    <!-- Loading -->
    <div *ngIf="loading" class="state-center">
      <div class="spinner"></div>
      <p>Loading venue data...</p>
    </div>

    <!-- Success -->
    <div *ngIf="success" class="alert-success">✅ Venue updated successfully! Redirecting...</div>

    <!-- Error -->
    <div *ngIf="error" class="alert-error">⚠️ {{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!loading && !success" id="update-venue-form">

      <div class="form-group">
        <label for="update-name">Venue Name <span class="required">*</span></label>
        <input id="update-name" formControlName="name" type="text" placeholder="Venue name"
          [class.input-error]="f['name'].touched && f['name'].invalid">
        <span class="field-error" *ngIf="f['name'].touched && f['name'].errors?.['required']">Name is required.</span>
        <span class="field-error" *ngIf="f['name'].touched && f['name'].errors?.['minlength']">At least 3 characters.</span>
      </div>

      <div class="form-group">
        <label for="update-address">Address <span class="required">*</span></label>
        <input id="update-address" formControlName="address" type="text" placeholder="Address"
          [class.input-error]="f['address'].touched && f['address'].invalid">
        <span class="field-error" *ngIf="f['address'].touched && f['address'].errors?.['required']">Address is required.</span>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="update-price">Price per Hour (TND) <span class="required">*</span></label>
          <input id="update-price" formControlName="pricePerHour" type="number"
            [class.input-error]="f['pricePerHour'].touched && f['pricePerHour'].invalid">
          <span class="field-error" *ngIf="f['pricePerHour'].touched && f['pricePerHour'].errors?.['required']">Required.</span>
          <span class="field-error" *ngIf="f['pricePerHour'].touched && f['pricePerHour'].errors?.['min']">Min 1.</span>
        </div>

        <div class="form-group">
          <label for="update-capacity">Capacity <span class="required">*</span></label>
          <input id="update-capacity" formControlName="capacity" type="number"
            [class.input-error]="f['capacity'].touched && f['capacity'].invalid">
          <span class="field-error" *ngIf="f['capacity'].touched && f['capacity'].errors?.['required']">Required.</span>
          <span class="field-error" *ngIf="f['capacity'].touched && f['capacity'].errors?.['min']">Min 1.</span>
        </div>
      </div>

      <div class="form-group">
        <label for="update-sport">Sport Type <span class="required">*</span></label>
        <select id="update-sport" formControlName="sportType"
          [class.input-error]="f['sportType'].touched && f['sportType'].invalid">
          <option value="">-- Select a sport --</option>
          <option *ngFor="let sport of sportTypes" [value]="sport.value">{{ sport.label }}</option>
        </select>
        <span class="field-error" *ngIf="f['sportType'].touched && f['sportType'].errors?.['required']">Sport type is required.</span>
      </div>

      <div class="form-actions">
        <a routerLink="/venue/my-venues" class="btn-cancel" id="cancel-update">Cancel</a>
        <button type="submit" class="btn-submit" [disabled]="saving" id="submit-update-venue">
          <span *ngIf="saving" class="spinner-sm"></span>
          {{ saving ? 'Saving...' : 'Save Changes' }}
        </button>
      </div>
    </form>
  </div>
</div>

<style>
  .form-page { display: flex; justify-content: center; padding: 24px 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .form-card { background: #fff; border: 1px solid #e0e0e5; border-radius: 16px; padding: 36px; width: 100%; max-width: 600px; }
  .form-card-header { margin-bottom: 28px; }
  .back-link { font-size: 13px; color: #6e6e73; text-decoration: none; display: inline-block; margin-bottom: 14px; }
  .back-link:hover { color: #000; }
  .form-title { font-size: 22px; font-weight: 700; color: #1d1d1f; margin: 0 0 6px; }
  .form-subtitle { font-size: 14px; color: #6e6e73; margin: 0; }
  .state-center { display: flex; flex-direction: column; align-items: center; padding: 40px; color: #6e6e73; gap: 12px; }
  .spinner { width: 32px; height: 32px; border: 3px solid #e0e0e5; border-top-color: #000; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .alert-success { background: #f1f8e9; border: 1px solid #c5e1a5; color: #2e7d32; padding: 14px 18px; border-radius: 10px; margin-bottom: 20px; }
  .alert-error { background: #fff2f2; border: 1px solid #ffcdd2; color: #c62828; padding: 14px 18px; border-radius: 10px; margin-bottom: 20px; }
  .form-group { margin-bottom: 20px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  label { display: block; font-size: 13px; font-weight: 600; color: #1d1d1f; margin-bottom: 6px; }
  .required { color: #c62828; }
  input, select { width: 100%; padding: 10px 14px; border: 1px solid #d0d0d5; border-radius: 10px; font-size: 14px; color: #1d1d1f; background: #fafafa; transition: border-color 0.15s, box-shadow 0.15s; box-sizing: border-box; outline: none; }
  input:focus, select:focus { border-color: #000; box-shadow: 0 0 0 3px rgba(0,0,0,0.06); background: #fff; }
  .input-error { border-color: #c62828 !important; }
  .field-error { display: block; font-size: 12px; color: #c62828; margin-top: 4px; }
  .form-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 28px; }
  .btn-cancel { padding: 10px 20px; border: 1px solid #d0d0d5; border-radius: 10px; font-size: 14px; color: #6e6e73; text-decoration: none; display: inline-flex; align-items: center; transition: background 0.15s; }
  .btn-cancel:hover { background: #f5f5f7; }
  .btn-submit { padding: 10px 24px; background: #000; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; display: inline-flex; align-items: center; gap: 8px; }
  .btn-submit:hover:not(:disabled) { opacity: 0.8; }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .spinner-sm { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
</style>
