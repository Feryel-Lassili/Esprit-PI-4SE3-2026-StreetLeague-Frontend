<div class="page-container">
  <div class="page-header">
    <h2>⚽ Matchs</h2>
    <button class="btn-add" (click)="openAdd()">+ Ajouter un match</button>
  </div>

  <div class="modal-overlay" *ngIf="showForm">
    <div class="modal">
      <h3>{{ isEditing ? 'Modifier' : 'Nouveau' }} Match</h3>
      <div class="form-grid">
        <label>Équipe domicile</label>
        <input [(ngModel)]="current.homeTeam" placeholder="Équipe domicile" />
        <label>Équipe visiteur</label>
        <input [(ngModel)]="current.awayTeam" placeholder="Équipe visiteur" />
        <label>Date</label>
        <input type="date" [(ngModel)]="current.date" />
        <label>Score</label>
        <input [(ngModel)]="current.score" placeholder="ex: 2 - 1" />
        <label>Lieu</label>
        <input [(ngModel)]="current.location" placeholder="Stade / lieu" />
      </div>
      <div class="modal-actions">
        <button class="btn-save" (click)="save()">✔ Enregistrer</button>
        <button class="btn-cancel" (click)="cancel()">Annuler</button>
      </div>
    </div>
  </div>

  <div class="cards-grid">
    <div class="card" *ngFor="let m of matches">
      <div class="card-header">{{ m.homeTeam }} vs {{ m.awayTeam }}</div>
      <div class="card-body">
        <p>📅 {{ m.date | date:'dd/MM/yyyy' }}</p>
        <p>📍 {{ m.location }}</p>
        <p class="score-badge">🏆 {{ m.score }}</p>
      </div>
      <div class="card-actions">
        <button class="btn-edit" (click)="openEdit(m)">✏ Modifier</button>
        <button class="btn-delete" (click)="delete(m.id!)">🗑 Supprimer</button>
      </div>
    </div>
    <div class="empty" *ngIf="matches.length === 0">Aucun match.</div>
  </div>
</div>
